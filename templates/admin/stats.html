<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Статистика | Центр Красок #1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/stats.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <div class="p-3">
                    <h4 class="text-white mb-4">🎨 Центр Красок</h4>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="/"><i class="bi bi-speedometer2 me-2"></i> Дашборд</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/users"><i class="bi bi-people me-2"></i> Пользователи</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/stats"><i class="bi bi-bar-chart me-2"></i> Статистика</a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Main content -->
            <div class="col-md-9 col-lg-10 ms-sm-auto px-4 py-3">
                <h1 class="h2 mb-4">📈 Статистика</h1>

                <div class="row">
                    <!-- Распределение моделей -->
                    <div class="col-md-6 mb-4">
                        <div class="card h-100">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">🤖 Распределение моделей</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="modelChart" height="200"></canvas>
                                <div class="mt-3 text-center">
                                    <span class="badge bg-success me-2" id="geminiCount">Gemini: 0</span>
                                    <span class="badge bg-info" id="groqCount">Groq: 0</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Общая статистика -->
                    <div class="col-md-6 mb-4">
                        <div class="card h-100">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">📊 Общая статистика</h5>
                            </div>
                            <div class="card-body">
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item d-flex justify-content-between">
                                        <span>👥 Всего пользователей</span>
                                        <strong class="stat-number text-primary" id="totalUsers">0</strong>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between">
                                        <span>🟢 Активны сегодня</span>
                                        <strong class="stat-number text-success" id="activeToday">0</strong>
                                    </li>
                                    <li class="list-group-item d-flex justify-content-between">
                                        <span>💬 Всего сообщений</span>
                                        <strong class="stat-number text-info" id="totalMessages">0</strong>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    (function () {

        // Безопасное получение данных из Jinja2
        const data = JSON.parse('{{ stats | tojson | safe }}');

        // Проверки
        const modelDistribution = data.model_distribution || {};

        // Обновляем значения
        document.getElementById('geminiCount').innerHTML =
            'Gemini: ' + (modelDistribution.gemini || 0);

        document.getElementById('groqCount').innerHTML =
            'Groq: ' + (modelDistribution.groq || 0);

        document.getElementById('totalUsers').innerHTML =
            data.total_users || 0;

        document.getElementById('activeToday').innerHTML =
            data.active_today || 0;

        document.getElementById('totalMessages').innerHTML =
            data.total_messages || 0;

        // График
        const ctx = document
            .getElementById('modelChart')
            .getContext('2d');

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Gemini', 'Groq'],
                datasets: [{
                    data: [
                        modelDistribution.gemini || 0,
                        modelDistribution.groq || 0
                    ],
                    backgroundColor: [
                        '#28a745',
                        '#0dcaf0'
                    ],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });

    })();
</script>
</body>
</html>
